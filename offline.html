<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#171343">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tokyo Trip">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/icons/icon-180.png">
  <title>Offline｜Tokyo Travel Dashboard</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f8fafc;
      color: #0f172a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(100%, 520px);
      padding: 24px;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 18px 44px rgba(15, 23, 42, .12);
    }
    h1 { margin: 0; font-size: 28px; line-height: 1.15; }
    p { margin: 12px 0 0; color: #334155; line-height: 1.6; font-weight: 650; }
    a {
      display: inline-flex;
      margin-top: 18px;
      min-height: 44px;
      align-items: center;
      padding: 10px 14px;
      border-radius: 12px;
      background: #3525cd;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>Offline Mode</h1>
    <p>你現在沒有網絡。請返回主頁查看已儲存的 Today、酒店、回程及清單資料。Google Maps、天氣和即時班次需要重新連線後才會更新。</p>
    <a href="./tokyo_itinerary.html">Open Offline Dashboard</a>
  </main>
</body>
</html>
